      title:"Algorithms & Complexity",icon:"∑",color:"rgba(79,184,255,0.1)",difficulty:"hard",
      overview:`
        <h4>Rate Limiter Algorithms</h4>
        <div class="kv-grid">
          <div class="kv-item"><div class="kv-k">Token Bucket</div><div class="kv-v">Tokens refill at rate R. Allows bursting up to bucket capacity. Redis: store {tokens, last_refill_ts}.</div></div>
          <div class="kv-item"><div class="kv-k">Sliding Window Counter</div><div class="kv-v">Approximate. Count per sub-window in Redis hash. Efficient + fairly accurate.</div></div>
          <div class="kv-item"><div class="kv-k">Sliding Window Log</div><div class="kv-v">Precise. Redis sorted set of timestamps. Higher memory cost.</div></div>
          <div class="kv-item"><div class="kv-k">Fixed Window</div><div class="kv-v">Simplest. Allows 2× burst at boundary. Redis INCR + EXPIRE.</div></div>
        </div>
        <h4>Backoff Strategies</h4>
        <ul>
          <li><strong>Linear</strong>: <code>base × attempt</code>. Predictable but synchronized stampede.</li>
          <li><strong>Exponential</strong>: <code>base × 2^attempt</code>. Grows fast. Still synchronized.</li>
          <li><strong>Full jitter</strong> (AWS recommended): <code>random(0, min(cap, base × 2^attempt))</code>. Desynchronizes retries. Eliminates thundering herd.</li>
          <li>Always: cap max wait (e.g. 30s), cap max attempts (e.g. 5), track total elapsed budget.</li>
        </ul>
        <h4>Top-K in Streams</h4>
        <ul>
          <li><strong>Exact</strong>: HashMap + size-K min-heap. O(log K) per event. O(distinct) memory.</li>
          <li><strong>Approximate</strong>: Count-Min Sketch (sub-linear memory) + Misra-Gries heavy hitters.</li>
          <li><strong>Production</strong>: Redis Sorted Set — <code>ZINCRBY</code> + <code>ZREVRANGE 0 K-1</code>.</li>
        </ul>
        <h4>Two-Pointer Technique</h4>
        <ul>
          <li>Two index variables traversing a data structure. Turns O(n²) → O(n).</li>
          <li>Backend uses: merge sorted log streams, detect overlapping intervals, sliding window rate limiters.</li>
          <li>Sliding window variant: expand right until condition met, shrink from left.</li>
        </ul>
        <h4>Cycle Detection</h4>
        <ul>
          <li>DFS with 3-color marking: white (unvisited) → gray (in DFS stack) → black (done). Gray → gray edge = cycle.</li>
          <li>Distributed deadlock: wait-for graph. Edge A→B = "A waits for B's lock." Cycle = deadlock. Abort victim on detection.</li>
        </ul>`,
      qa:[
        {q:"How do you find a cycle in a distributed task dependency graph?",a:`<p>Model tasks as a directed graph (edge A→B = "A depends on B"). <strong>Algorithm</strong>: DFS with 3-color marking — white (unvisited), gray (in DFS stack), black (done). If you reach a gray node, you've found a back edge = cycle. O(V+E). <strong>Distributed context</strong>: Collect all dependency edges, build the full graph on a coordinator, run cycle detection once. <strong>Runtime deadlock detection</strong>: Build a wait-for graph (edge A→B = "A waits for the lock B holds"). Cycle = deadlock. Run on a background process; on detection, abort the victim transaction (typically the youngest). PostgreSQL's deadlock detector uses this approach.</p>`},
        {q:"Implement a rate limiter using the token bucket or sliding window algorithm.",a:`<p><strong>Token Bucket</strong>: Bucket holds N tokens max, refills at rate R/sec. Each request consumes 1. Redis: store <code>{tokens, last_refill_ts}</code> in a hash. On request (Lua script): <code>elapsed = now - last_refill; new_tokens = min(cap, tokens + elapsed * R); if new_tokens >= 1: new_tokens -= 1; allow else: reject</code>. Atomic via Lua. <strong>Sliding Window Counter</strong>: Divide window into sub-windows. Redis hash of sub-window → count. On request: sum counts in last W seconds + weighted current sub-window fraction. If ≥ limit → reject. Atomic via Lua. Return <code>429</code> + <code>Retry-After</code> + <code>X-RateLimit-*</code> headers on rejection.</p>`},
        {q:"Given a stream of events, how do you find the top-K most frequent in real time?",a:`<p><strong>Exact</strong>: HashMap (event → count) + size-K min-heap. Per event: increment count in map. If event in heap, update priority. If not and heap &lt; K, add. If not and heap full and new count > heap min, replace min. O(log K) per event. <strong>Approximate for high-throughput</strong>: Count-Min Sketch for frequency estimation + Misra-Gries for heavy hitters — sub-linear memory, bounded error. <strong>Production</strong>: Kafka Streams with windowed aggregation + punctuator; or Redis Sorted Set with <code>ZINCRBY</code> for score updates and <code>ZREVRANGE 0 K-1</code> for top-K query. O(log N) per event, O(K) for query.</p>`},
        {q:"How would you detect duplicate requests (idempotency keys) efficiently at scale?",a:`<p>Client generates a UUID v4 <code>Idempotency-Key</code> per logical operation. Server uses Redis for atomic check-and-store. On request arrival: <code>SET idempotency:{key} "processing" NX EX 86400</code>. If SET succeeds (new key): process request, store full response as key value when done. If SET fails (key exists): fetch stored response and return it immediately. Use Lua script for atomic check-store-retrieve to prevent race conditions. Handle "processing" in-flight state (key exists but value = "processing") by returning <code>409 Conflict</code> suggesting retry after a short delay. TTL defines the replay window — clients shouldn't expect idempotency guarantees after TTL expires.</p>`},
        {q:"Explain the two-pointer technique and give a backend-relevant problem it solves.",a:`<p><strong>Two-pointer</strong>: Two indices traversing a data structure to turn O(n²) → O(n). <strong>Backend use case — merge sorted event streams</strong>: Two services emit timestamped logs into sorted arrays. Two pointers (one per array) advance picking the smaller timestamp. O(n+m) vs O((n+m) log(n+m)). <strong>Detecting overlapping bookings</strong>: Sort reservations by start time, track max end seen — if next start &lt; max end, overlap detected. <strong>Sliding window variant</strong>: Find minimum-length time window in API logs where error rate exceeds threshold — expand right pointer until condition met, shrink from left. Essential for efficient stream processing.</p>`},
        {q:"How do you design a job scheduler that handles priorities and retries?",a:`<p><strong>Schema</strong>: <code>jobs</code> table with id, payload, status (pending/running/done/dead), priority, attempts, max_attempts, scheduled_at, locked_until. <strong>Atomic worker claim</strong>: <code>UPDATE jobs SET status='running' WHERE id=(SELECT id FROM jobs WHERE status='pending' AND scheduled_at<=NOW() ORDER BY priority DESC, scheduled_at ASC FOR UPDATE SKIP LOCKED LIMIT 1) RETURNING *</code>. SKIP LOCKED enables concurrent workers without contention. <strong>Retries</strong>: On failure, increment attempts, set <code>scheduled_at = NOW() + 2^attempts * base + random_jitter</code> (exponential backoff with jitter). After max_attempts → status='dead' + alert. Monitor queue depth per priority tier, processing latency, dead job count.</p>`},
        {q:"Explain backoff strategies — linear, exponential, jitter — and implement one.",a:`<p><strong>Linear</strong>: <code>base × attempt</code>. Predictable but synchronized across clients — thundering herd. <strong>Exponential</strong>: <code>base × 2^attempt</code>. Fast growth, reduces retry frequency. Still synchronized. <strong>Full jitter</strong> (AWS recommended): <code>sleep = random(0, min(cap, base × 2^attempt))</code>. Desynchronizes retries across clients. Eliminates thundering herd. <strong>Decorrelated jitter</strong>: <code>sleep = min(cap, random(base, prev_sleep × 3))</code>. Always: cap max wait (30s), cap max attempts (5), track total elapsed time budget. Python: <code>def backoff(n, base=0.5, cap=30): import random; return random.uniform(0, min(cap, base*(2**n)))</code>. Implement at HTTP client layer so all outbound calls get it automatically.</p>`},
      ]
    },
  ]},
  {week:"Week 6",label:"System Design & Leadership",desc:"Tackle classic system design problems and sharpen tech lead behavioral competencies.",topics:[
    {
      title:"System Design Problems",icon:"🖥️",color:"rgba(255,107,107,0.08)",difficulty:"hard",
      overview:`
        <h4>System Design Framework</h4>
        <ul>
          <li><strong>1. Clarify requirements</strong> — functional (what it does) + non-functional (scale, latency, consistency, availability).</li>
          <li><strong>2. Estimate scale</strong> — QPS, storage, bandwidth. Back-of-envelope math.</li>
          <li><strong>3. High-level design</strong> — clients, API layer, services, data stores. Draw the diagram.</li>
          <li><strong>4. Deep dive</strong> — pick 2–3 interesting components and go deep.</li>
          <li><strong>5. Trade-offs</strong> — articulate what you'd do differently at 10×, 100× scale.</li>
        </ul>
        <h4>Common Building Blocks</h4>
        <div class="kv-grid">
          <div class="kv-item"><div class="kv-k">API Gateway</div><div class="kv-v">Auth, rate limiting, routing, TLS termination, observability.</div></div>
          <div class="kv-item"><div class="kv-k">CDN / Cache</div><div class="kv-v">CloudFront + Redis. Edge caching + hot data.</div></div>
          <div class="kv-item"><div class="kv-k">Message Queue</div><div class="kv-v">SQS / Kafka. Decoupling, async processing, fan-out.</div></div>
          <div class="kv-item"><div class="kv-k">Object Storage</div><div class="kv-v">S3. Images, videos, backups, data lake.</div></div>
          <div class="kv-item"><div class="kv-k">Search</div><div class="kv-v">Elasticsearch / OpenSearch. Full-text + geo + aggregations.</div></div>
          <div class="kv-item"><div class="kv-k">Stream Processing</div><div class="kv-v">Kafka + Flink/Spark. Real-time aggregations.</div></div>
        </div>
        <h4>Key Design Trade-offs</h4>
        <ul>
          <li><strong>SQL vs NoSQL</strong> — Complex queries + transactions vs scale + flexible schema.</li>
          <li><strong>Consistency vs Availability</strong> — CAP theorem. Under partition, you choose one.</li>
          <li><strong>Push vs Pull</strong> — Webhooks (push) efficient but requires public endpoint; polling (pull) simple but wasteful.</li>
          <li><strong>Sync vs Async</strong> — Sync for immediate feedback; async for decoupling + scale.</li>
          <li><strong>Denormalized vs Normalized</strong> — Denormalized = fast reads, complex writes; normalized = data integrity, complex reads.</li>
        </ul>
        <h4>Interview Red Flags to Avoid</h4>
        <ul>
          <li>Jumping to a solution without clarifying requirements.</li>
          <li>Designing for 1B users when the problem says 10k.</li>
          <li>Not mentioning failure modes or bottlenecks.</li>
          <li>Single points of failure in every component.</li>
          <li>Ignoring observability (no metrics, tracing, or alerting).</li>
        </ul>`,
      qa:[
        {q:"Design a URL shortener like bit.ly (focus on scale, storage, and redirect latency).",a:`<p><strong>Core flows</strong>: Write — <code>POST /shorten {url}</code> → generate short code → store → return short URL. Read — <code>GET /{code}</code> → lookup → redirect. <strong>Short code</strong>: Hash URL (SHA-256), take first 6–7 base62 chars. Handle collisions with retry. Or: auto-increment ID encoded in base62 (guaranteed unique). 6 base62 chars = ~56B unique codes. <strong>Storage</strong>: DynamoDB (code as PK) for O(1) lookup. Redis + CloudFront cache hot codes. Use <code>301</code> (browser caches, lower server load) or <code>302</code> (server tracks all clicks). <strong>Analytics</strong>: Async write click events to Kinesis → S3 → Athena. Read-heavy — cache aggressively.</p>`},
        {q:"Design a notification service that handles email, SMS, and push at high volume.",a:`<p><strong>Architecture</strong>: Upstream → Notification API → SNS topic → three SQS queues (Email, SMS, Push) → Lambda consumers → providers (SES, Twilio, FCM/APNs). Isolation: SMS outage doesn't affect email. <strong>Key design</strong>: Template engine (S3/DynamoDB + i18n rendering). Opt-out check (DynamoDB) before sending — CAN-SPAM/GDPR. Idempotency key per notification (Redis NX) to prevent duplicate sends. Provider rate limiting (token bucket). DLQ after 3 failures + PagerDuty alert. <strong>Observability</strong>: Delivery rate, bounce rate, channel health dashboard. Alert on any degradation.</p>`},
        {q:"Design a distributed task queue with retries, dead-letter handling, and priority.",a:`<p><strong>Option A — SQS</strong>: Producers → SQS. <code>maxReceiveCount=3</code> + DLQ. Priority: two queues (high/normal), consumers poll high first. FIFO for ordering within tier. <strong>Option B — DB-backed</strong>: Jobs table with status, priority, attempts, next_run_at. Workers use <code>SELECT ... FOR UPDATE SKIP LOCKED</code>. Retry with exponential backoff + jitter in next_run_at. After max_attempts → dead + alert. Priority via <code>ORDER BY priority DESC</code>. <strong>Observability</strong>: Queue depth per tier, processing latency histogram, dead job count, DLQ alert. Option A for AWS-native simplicity; Option B for full control + portability (Celery, BullMQ).</p>`},
        {q:"How would you design a real-time leaderboard for a gaming backend?",a:`<p><strong>Core</strong>: Redis Sorted Set. <code>ZADD leaderboard {score} {player_id}</code>, <code>ZINCRBY</code> for increments, <code>ZREVRANK</code> for rank, <code>ZREVRANGE 0 99 WITHSCORES</code> for top 100. All O(log N). <strong>Scale</strong>: Shard by player ID range across Redis nodes. Hierarchical aggregation: local → regional → global on a schedule. For near-real-time global: Kafka → Flink windowed aggregation → Redis. <strong>Persistence</strong>: Snapshot sorted set to DynamoDB periodically. <strong>Friend leaderboard</strong>: Fetch friend list, batch <code>ZSCORE</code> via Redis pipelining. <strong>Anti-cheat</strong>: Server-side score validation, rate-limit submissions, anomaly detection on large deltas.</p>`},
        {q:"Design an API gateway — what cross-cutting concerns does it handle?",a:`<p>Single entry point for all external clients. Cross-cutting concerns: (1) <strong>Auth/Authz</strong> — validate JWTs/API keys, forward user identity as trusted header. (2) <strong>Rate limiting</strong> — per client, endpoint, tier. (3) <strong>TLS termination</strong> — offload certificate management. (4) <strong>Request routing</strong> — path/host/version-based. (5) <strong>Transformation</strong> — header injection, protocol translation (REST→gRPC), payload shaping. (6) <strong>Load balancing</strong> — across service instances. (7) <strong>Circuit breaking + timeouts</strong>. (8) <strong>Observability</strong> — unified access logs, request ID injection, latency metrics per route. (9) <strong>Caching</strong> — edge-cache GET responses. Options: AWS API Gateway, Kong, NGINX Plus, Envoy. Service mesh (Istio) complements for east-west traffic.</p>`},
        {q:"How would you design a multi-tenant SaaS backend with data isolation?",a:`<p>Three models: <strong>Silo</strong> (DB per tenant) — strongest isolation, simplest compliance, expensive. <strong>Bridge</strong> (schema per tenant) — middle ground. <strong>Pool</strong> (shared schema + tenant_id column) — most efficient, needs careful implementation. <strong>Pool best practices</strong>: Every table has indexed <code>tenant_id</code>. Use PostgreSQL <strong>Row-Level Security (RLS)</strong> to enforce <code>WHERE tenant_id = current_setting('app.tenant_id')</code> at DB level — not just application code. Middleware/ORM plugin injects tenant context automatically. Composite indexes <code>(tenant_id, entity_id)</code>. Per-tenant resource quotas in tenants table. For data residency (GDPR): regional deployments with tenant-to-region routing at signup.</p>`},
        {q:"Design a distributed rate limiter that works across multiple backend instances.",a:`<p>Local in-process rate limiter breaks with horizontal scaling (effective limit = limit × instances). Need shared state. <strong>Fixed window — Redis</strong>: Lua script: <code>INCR key; if count==1 then EXPIRE key window end; return count</code>. If count > limit → 429. Simple but allows 2× burst at window boundary. <strong>Sliding window — Redis Sorted Set</strong>: On each request: <code>ZREMRANGEBYSCORE 0 (now-window)</code> → <code>ZCARD</code> → <code>ZADD now now</code> → if count ≥ limit → reject. Accurate but higher memory. <strong>Token bucket — Redis</strong>: Store <code>{tokens, last_updated}</code> in hash. Atomic Lua refill + decrement on each request. For very high throughput: local token bucket per instance refilled periodically from a Redis global budget (reduces Redis calls).</p>`},
      ]
    },
    {
      title:"Tech Lead Behavioral",icon:"👥",color:"rgba(79,255,176,0.06)",difficulty:"easy",
      overview:`
        <h4>STAR Framework for All Behavioral Answers</h4>
        <ul>
          <li><strong>S</strong>ituation — Concrete context. Team size, company stage, specific problem.</li>
          <li><strong>T</strong>ask — Your role and the specific challenge you faced.</li>
          <li><strong>A</strong>ction — What YOU specifically did. Steps taken, how you handled it.</li>
          <li><strong>R</strong>esult — Measurable outcome. What improved, what you learned.</li>
        </ul>
        <h4>Tech Lead Core Responsibilities</h4>
        <ul>
          <li>Technical direction and architectural decisions (ADRs, RFCs).</li>
          <li>Team productivity — removing blockers, mentoring, onboarding.</li>
          <li>Engineering quality — code review standards, test culture, CI/CD.</li>
          <li>Stakeholder communication — translating technical constraints into business language.</li>
          <li>Tech debt management — making it visible and prioritized.</li>
        </ul>
        <h4>Build vs Buy Framework</h4>
        <ul>
          <li>Core competency? → Build. Commodity infra? → Buy.</li>
          <li>TCO: include integration, maintenance, lock-in, migration risk.</li>
          <li>Time to value: buying is weeks; building is months + ongoing maintenance.</li>
          <li>Never build: auth from scratch, email delivery, payments, monitoring infra.</li>
        </ul>
        <h4>ADR (Architectural Decision Record) Format</h4>
        <ul>
          <li><strong>Title</strong> — Verb phrase. e.g. "Use PostgreSQL for transactional storage".</li>
          <li><strong>Status</strong> — Proposed / Accepted / Deprecated / Superseded by ADR-042.</li>
          <li><strong>Context</strong> — Problem, constraints, forces in tension.</li>
          <li><strong>Decision</strong> — What and why, in plain language.</li>
          <li><strong>Consequences</strong> — What becomes easier/harder, risks accepted, follow-up work.</li>
        </ul>
        <h4>Key Principles to Mention</h4>
        <ul>
          <li>Push back with data and alternatives — not objections alone.</li>
          <li>Disagree and commit — model it explicitly for your team.</li>
          <li>Make the right thing easy and the wrong thing visible.</li>
          <li>Frame tech debt in business impact terms, not code quality terms.</li>
          <li>Timebox unresolved technical debates — indecision has a cost.</li>
        </ul>`,
      qa:[
        {q:"How do you make a build-vs-buy decision for a critical piece of infrastructure?",a:`<p>Framework: (1) <strong>Core competency</strong> — does this differentiate your product? Yes → build. Commodity infra → buy. (2) <strong>Total cost of ownership</strong> — vendor cost + integration + maintenance + lock-in + migration risk. (3) <strong>Time to value</strong> — buying: weeks; building: months + ongoing ownership. (4) <strong>Control and flexibility</strong> — how much customization needed? Vendor SLA alignment? (5) <strong>Team capability</strong> — can you hire/retain expertise to build and maintain this reliably? Process: write requirements first, evaluate 2–3 vendors seriously, build a PoC to validate assumptions. Document as an ADR with alternatives considered. Never build: auth, payments, email delivery, infra monitoring from scratch.</p>`},
        {q:"Describe a time you had to push back on a technical direction from a stakeholder.",a:`<p>Use <strong>STAR</strong>. <em>Situation</em>: concrete context (e.g. "CTO wanted to rewrite the auth service in a new framework in 4 weeks"). <em>Task</em>: your role as tech lead responsible for delivery and team health. <em>Action</em>: gathered data (realistic timeline estimate with risks), identified the real business goal the stakeholder cared about, proposed an alternative achieving the goal with lower risk, built alignment with your team before the meeting, framed risk in business impact terms not technical complaints. <em>Result</em>: agreed on a phased approach; avoided a high-risk delivery. Key principles: push back with data + alternatives, not objections alone. Know when to disagree and commit once all info is on the table.</p>`},
        {q:"How do you onboard a new engineer to a complex codebase quickly?",a:`<p><strong>Before day one</strong>: Living onboarding doc (architecture diagrams, key services, how to run locally as a working script, debugging patterns, who owns what). Assign a buddy. Pre-provision accounts and IDE setup. <strong>Week 1</strong>: Architecture walkthrough (why, not just what). Run the system end-to-end. Assign a well-scoped starter task — not trivial, not risky. Pair-program on first PR. <strong>Weeks 2–4</strong>: Progressive scope increase. Include in design discussions as observer first. Share ADRs for key past decisions. <strong>Ongoing</strong>: Regular 1:1s. Ask "what's the most confusing thing this week?" — engineers often don't ask for help when stuck. Measure time-to-first-independent-PR as an onboarding health metric.</p>`},
        {q:"How do you balance technical debt reduction against feature velocity?",a:`<p>First make debt <strong>visible and quantified</strong>. Maintain a tech debt register with business impact — "auth fragility caused 3 incidents in Q3 at 40 engineering hours cost." Invisible debt never gets prioritized. Categorize: critical (security/data loss — fix now), high (measurably slowing delivery), low (annoyances). Strategies: (1) <strong>Fixed allocation</strong> — 15–20% of each sprint. (2) <strong>Boy Scout Rule</strong> — every PR leaves code slightly better. (3) <strong>Attach debt to features</strong> — refactor a module when building on it. (4) <strong>Frame in business terms</strong> — "current search causes 4 min of P1 incidents/week" lands better than "the code is messy." Surface debt at sprint level; escalate critical items to stakeholders with cost-of-delay analysis.</p>`},
        {q:"Describe how you've driven adoption of a new standard or pattern across a team.",a:`<p>(1) <strong>Problem first</strong> — identify the pain the standard solves. Engineers need to feel the problem. (2) <strong>Pilot it</strong> — implement in one real service with a willing engineer. Measure outcomes. (3) <strong>Write an RFC/ADR</strong> — articulate why, alternatives considered, migration path. Async feedback 48–72 hours. (4) <strong>Present and demo</strong> — live demo beats slides. (5) <strong>Provide tooling</strong> — linter rule, Cookiecutter template, shared library. Documentation alone is not enough. (6) <strong>Reinforce in code review</strong> — consistently and kindly flag deviations with a link. (7) <strong>Measure adoption</strong> via static analysis in CI. Celebrate milestones. Meta-principle: make the right thing easy and the wrong thing visible.</p>`},
        {q:"How do you run effective architectural decision records (ADRs)?",a:`<p><strong>Format</strong>: Title (verb phrase), Status (proposed/accepted/deprecated/superseded), Context (problem + constraints), Decision (what + why in plain language), Consequences (trade-offs, risks, follow-up work). 1–2 pages max. <strong>Process</strong>: Write ADRs for decisions that are hard to reverse, cross team boundaries, involve meaningful trade-offs, or would cause "why did we do this?" confusion. Open a PR against the repo (<code>/docs/adr/</code>, numbered sequentially). 48–72hr async review. Present high-impact decisions in tech sync. Once accepted, never update — create a new superseding ADR if the decision changes. The value is in context and reasoning, not just the outcome. An ADR that only documents the chosen option without alternatives is a decision log, not a decision record.</p>`},
        {q:"How do you handle disagreement between engineers on a technical approach?",a:`<p>(1) <strong>Structured space</strong> — move out of Slack, ask each engineer to write up their proposal with trade-offs. Writing forces clarity and reduces heat. (2) <strong>Facts vs opinions</strong> — testable claims need benchmarks, not debates. (3) <strong>Explicit criteria</strong> — what matters most here: performance, simplicity, team familiarity, time to production? Disagreements often dissolve when criteria are made explicit. (4) <strong>Spike to resolve empirical disputes</strong> — 2-day technical spike with real data ends what hours of discussion cannot. (5) <strong>Timebox</strong> — set a decision deadline and honor it. (6) <strong>Tech lead breaks the tie</strong> — don't avoid the decision to avoid conflict. Document in an ADR. Normalize disagree-and-commit as a healthy team behavior — explicitly name and model it yourself.</p>`},
      ]
    },
  ]},
];

let state = {};
try { const s = localStorage.getItem('tl_v3'); if(s) state = JSON.parse(s); } catch(e){}
function save() { try { localStorage.setItem('tl_v3', JSON.stringify(state)); } catch(e){} }

let totalQ = 0;
plan.forEach((w,wi) => w.topics.forEach((t,ti) => { totalQ += t.qa.length; }));
function doneCount() { return Object.values(state).filter(Boolean).length; }

function updateOverall() {
  const d = doneCount();
  document.getElementById('done-count').textContent = d;
  document.getElementById('total-count').textContent = totalQ;
  const pct = totalQ ? Math.round(d/totalQ*100) : 0;
  document.getElementById('pct-val').textContent = pct + '%';
  document.getElementById('overall-bar').style.width = pct + '%';
  document.getElementById('overall-label').textContent = d + ' / ' + totalQ + ' questions complete';
}

function updateMiniBar(wi, ti) {
  const topic = plan[wi].topics[ti];
  const dc = topic.qa.filter((_,qi) => state[`${wi}-${ti}-${qi}`]).length;
  const fill = document.getElementById(`mf-${wi}-${ti}`);
  const txt = document.getElementById(`mt-${wi}-${ti}`);
  if(fill) fill.style.width = Math.round(dc/topic.qa.length*100) + '%';
  if(txt) txt.textContent = dc + '/' + topic.qa.length;
}

const sidebar = document.getElementById('sidebar');
const content = document.getElementById('content');

plan.forEach((week, wi) => {
  const nav = document.createElement('a');
  nav.className = 'nav-item' + (wi===0?' active':'');
  nav.href = '#';
  nav.innerHTML = `<div><div class="nav-week">Week ${wi+1}</div><div class="nav-label">${week.label}</div></div><div class="nav-dot"></div>`;
  nav.onclick = (e) => {
    e.preventDefault();
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    document.querySelectorAll('.week-section').forEach(s=>s.classList.remove('active'));
    nav.classList.add('active');
    document.getElementById('week-'+wi).classList.add('active');
    window.scrollTo(0,0);
  };
  sidebar.appendChild(nav);

  const section = document.createElement('div');
  section.className = 'week-section' + (wi===0?' active':'');
  section.id = 'week-'+wi;
  section.innerHTML = `<div class="week-heading"><span class="week-num">${week.week}</span><h2 class="week-title">${week.label}</h2></div><p class="week-desc">${week.desc}</p>`;

  week.topics.forEach((topic, ti) => {
    const card = document.createElement('div');
    card.className = 'topic-card';

    const diffClass = topic.difficulty==='hard'?'badge-hard':topic.difficulty==='med'?'badge-med':'badge-easy';
    const diffLabel = topic.difficulty==='hard'?'Hard':topic.difficulty==='med'?'Medium':'Easy';

    // Topic header
    const header = document.createElement('div');
    header.className = 'topic-header';
    header.innerHTML = `<div class="topic-icon" style="background:${topic.color}">${topic.icon}</div><span class="topic-name">${topic.title}</span><span class="badge ${diffClass}">${diffLabel}</span><div class="topic-progress-mini"><div class="mini-bar"><div class="mini-fill" id="mf-${wi}-${ti}" style="width:0%"></div></div><span class="mini-text" id="mt-${wi}-${ti}">0/${topic.qa.length}</span></div><span class="chevron-icon">▾</span>`;
    header.onclick = () => card.classList.toggle('open');

    // Topic panel (overview + questions)
    const panel = document.createElement('div');
    panel.className = 'topic-panel';

    // Overview section
    const overviewWrap = document.createElement('div');
    const overviewBar = document.createElement('div');
    overviewBar.className = 'overview-bar';
    overviewBar.innerHTML = `<div class="overview-bar-left"><span style="font-size:14px;">📖</span><span class="overview-label">Topic Overview &amp; Cheat Sheet</span></div><span class="overview-chevron">▾</span>`;
    const overviewBody = document.createElement('div');
    overviewBody.className = 'overview-body';
    overviewBody.innerHTML = topic.overview;
    overviewBar.onclick = () => overviewWrap.classList.toggle('overview-open');
    overviewWrap.appendChild(overviewBar);
    overviewWrap.appendChild(overviewBody);
    panel.appendChild(overviewWrap);

    // Questions section
    const questionsPanel = document.createElement('div');
    questionsPanel.className = 'questions-panel';
    const qTitle = document.createElement('div');
    qTitle.className = 'q-section-title';
    qTitle.textContent = 'Interview Questions';
    questionsPanel.appendChild(qTitle);

    topic.qa.forEach(({q, a}, qi) => {
      const key = `${wi}-${ti}-${qi}`;
      const item = document.createElement('div');
      item.className = 'q-item';

      const qtop = document.createElement('div');
      qtop.className = 'q-top';

      const chk = document.createElement('div');
      chk.className = 'q-check' + (state[key]?' checked':'');
      const txt = document.createElement('span');
      txt.className = 'q-text' + (state[key]?' done':'');
      txt.textContent = q;

      chk.onclick = () => {
        state[key] = !state[key];
        chk.classList.toggle('checked', state[key]);
        txt.classList.toggle('done', state[key]);
        save(); updateMiniBar(wi,ti); updateOverall();
      };

      qtop.appendChild(chk);
      qtop.appendChild(txt);

      const btn = document.createElement('button');
      btn.className = 'ans-toggle';
      btn.textContent = '▸ show answer';
      const box = document.createElement('div');
      box.className = 'answer-box';
      box.innerHTML = a;
      btn.onclick = () => { const o = box.classList.toggle('open'); btn.textContent = o ? '▾ hide answer' : '▸ show answer'; };

      item.appendChild(qtop);
      item.appendChild(btn);
      item.appendChild(box);
      questionsPanel.appendChild(item);
    });

    panel.appendChild(questionsPanel);
    card.appendChild(header);
    card.appendChild(panel);
    section.appendChild(card);
  });

  content.appendChild(section);
});

plan.forEach((_,wi) => plan[wi].topics.forEach((_,ti) => updateMiniBar(wi,ti)));
updateOverall();
</script>
