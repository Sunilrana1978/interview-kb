<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" href="../../favicon.svg" type="image/svg+xml" />
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Backend Tech Lead — Interview Study Plan</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0d0f14;--bg2:#13161e;--bg3:#1a1e28;--bg4:#202535;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--text:#e8eaf0;--muted:#7a7f8e;--accent:#4fffb0;--accent2:#4fb8ff;--danger:#ff6b6b;--warn:#ffb84f;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6;}
  /* HERO */
  .hero{position:relative;padding:56px 48px 44px;border-bottom:1px solid var(--border);overflow:hidden;}
  .hero::before{content:'';position:absolute;top:-80px;right:-80px;width:400px;height:400px;background:radial-gradient(circle,rgba(79,255,176,0.08) 0%,transparent 70%);pointer-events:none;}
  .hero-tag{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.15em;color:var(--accent);text-transform:uppercase;margin-bottom:14px;opacity:.8;}
  .hero h1{font-family:'Syne',sans-serif;font-size:clamp(26px,4vw,46px);font-weight:700;letter-spacing:-.02em;line-height:1.1;margin-bottom:12px;}
  .hero h1 span{color:var(--accent);}
  .hero p{color:var(--muted);font-size:14px;max-width:520px;font-weight:300;}
  .stats-row{display:flex;gap:28px;margin-top:28px;flex-wrap:wrap;}
  .stat{display:flex;flex-direction:column;gap:3px;}
  .stat-val{font-family:'Syne',sans-serif;font-size:26px;font-weight:700;color:var(--accent);}
  .stat-lbl{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:.05em;}
  .progress-overall{margin-top:20px;max-width:480px;}
  .progress-overall-bar{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:8px;}
  .progress-overall-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .4s ease;}
  .progress-overall-label{font-size:11px;color:var(--muted);margin-top:5px;font-family:'DM Mono',monospace;}
  /* LAYOUT */
  .main{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 200px);}
  .sidebar{border-right:1px solid var(--border);padding:28px 0;position:sticky;top:0;height:100vh;overflow-y:auto;}
  .sidebar-title{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;padding:0 24px;margin-bottom:10px;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 24px;cursor:pointer;transition:all .15s;border-left:2px solid transparent;text-decoration:none;}
  .nav-item:hover{background:var(--bg3);}
  .nav-item.active{border-left-color:var(--accent);background:rgba(79,255,176,0.05);}
  .nav-week{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;}
  .nav-label{font-size:13px;color:var(--text);font-weight:400;}
  .nav-item.active .nav-label{color:var(--accent);}
  .nav-dot{width:6px;height:6px;border-radius:50%;background:var(--bg3);border:1px solid var(--border2);flex-shrink:0;margin-left:auto;}
  .nav-item.active .nav-dot{background:var(--accent);border-color:var(--accent);}
  /* CONTENT */
  .content{padding:36px 48px;}
  .week-section{display:none;}
  .week-section.active{display:block;}
  .week-heading{display:flex;align-items:baseline;gap:14px;margin-bottom:6px;}
  .week-num{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);letter-spacing:.15em;text-transform:uppercase;}
  .week-title{font-family:'Syne',sans-serif;font-size:24px;font-weight:700;letter-spacing:-.01em;}
  .week-desc{font-size:13px;color:var(--muted);margin-bottom:28px;font-weight:300;}
  /* TOPIC CARD */
  .topic-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;margin-bottom:14px;overflow:hidden;transition:border-color .2s;}
  .topic-card:hover{border-color:var(--border2);}
  .topic-header{display:flex;align-items:center;gap:12px;padding:16px 20px;cursor:pointer;user-select:none;}
  .topic-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
  .topic-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:600;flex:1;}
  .badge{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:3px 9px;border-radius:20px;}
  .badge-hard{background:rgba(255,107,107,0.12);color:var(--danger);border:1px solid rgba(255,107,107,0.2);}
  .badge-med{background:rgba(255,184,79,0.12);color:var(--warn);border:1px solid rgba(255,184,79,0.2);}
  .badge-easy{background:rgba(79,255,176,0.12);color:var(--accent);border:1px solid rgba(79,255,176,0.2);}
  .topic-progress-mini{display:flex;align-items:center;gap:7px;}
  .mini-bar{width:56px;height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;}
  .mini-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s;}
  .mini-text{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);min-width:30px;}
  .chevron-icon{font-size:13px;color:var(--muted);transition:transform .25s;flex-shrink:0;}
  .topic-card.open .chevron-icon{transform:rotate(180deg);}
  /* TOPIC PANEL */
  .topic-panel{display:none;border-top:1px solid var(--border);}
  .topic-card.open .topic-panel{display:block;}
  /* TOPIC OVERVIEW */
  .overview-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:var(--bg3);cursor:pointer;user-select:none;border-bottom:1px solid var(--border);}
  .overview-bar-left{display:flex;align-items:center;gap:8px;}
  .overview-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);opacity:.85;}
  .overview-chevron{font-size:11px;color:var(--muted);transition:transform .2s;}
  .overview-open .overview-chevron{transform:rotate(180deg);}
  .overview-body{display:none;padding:16px 20px 18px;background:var(--bg3);border-bottom:1px solid var(--border);}
  .overview-open .overview-body{display:block;}
  .overview-body h4{font-family:'Syne',sans-serif;font-size:13px;font-weight:600;color:var(--accent2);margin-bottom:8px;margin-top:14px;}
  .overview-body h4:first-child{margin-top:0;}
  .overview-body p{font-size:12.5px;color:#b8bcc8;line-height:1.7;margin-bottom:6px;font-weight:300;}
  .overview-body ul{padding-left:14px;margin:4px 0 8px;}
  .overview-body ul li{font-size:12.5px;color:#b8bcc8;line-height:1.65;margin-bottom:3px;}
  .overview-body strong{color:var(--accent);font-weight:500;}
  .overview-body code{font-family:'DM Mono',monospace;font-size:11px;background:rgba(79,255,176,0.08);color:var(--accent);padding:1px 5px;border-radius:3px;}
  .overview-body em{color:var(--warn);font-style:normal;}
  .kv-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:8px 0;}
  .kv-item{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:6px;padding:8px 11px;}
  .kv-item .kv-k{font-family:'DM Mono',monospace;font-size:10px;color:var(--accent2);letter-spacing:.08em;margin-bottom:3px;}
  .kv-item .kv-v{font-size:12px;color:#b8bcc8;line-height:1.5;}
  /* QUESTIONS */
  .questions-panel{padding:0 20px 14px;}
  .q-section-title{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);padding:12px 0 8px;border-bottom:1px solid var(--border);margin-bottom:4px;}
  .q-item{border-bottom:1px solid var(--border);padding:12px 0;}
  .q-item:last-child{border-bottom:none;}
  .q-top{display:flex;align-items:flex-start;gap:11px;}
  .q-check{width:17px;height:17px;border-radius:4px;border:1.5px solid var(--border2);cursor:pointer;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .15s;background:transparent;}
  .q-check:hover{border-color:var(--accent);}
  .q-check.checked{background:var(--accent);border-color:var(--accent);}
  .q-check.checked::after{content:'';width:8px;height:5px;border-left:2px solid #0d0f14;border-bottom:2px solid #0d0f14;transform:rotate(-45deg) translateY(-1px);display:block;}
  .q-text{font-size:13.5px;color:var(--text);line-height:1.6;font-weight:400;flex:1;}
  .q-text.done{color:var(--muted);text-decoration:line-through;}
  .ans-toggle{display:inline-flex;align-items:center;gap:5px;margin-top:8px;margin-left:28px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;color:var(--accent2);cursor:pointer;opacity:.7;transition:opacity .15s;background:none;border:none;padding:0;}
  .ans-toggle:hover{opacity:1;}
  .answer-box{display:none;margin:10px 0 2px 28px;background:var(--bg3);border-left:2px solid var(--accent2);border-radius:0 8px 8px 0;padding:14px 16px;}
  .answer-box.open{display:block;}
  .answer-box p{font-size:13px;color:#c8cad4;line-height:1.75;margin-bottom:10px;font-weight:300;}
  .answer-box p:last-child{margin-bottom:0;}
  .answer-box strong{color:var(--accent);font-weight:500;}
  .answer-box em{color:var(--warn);font-style:normal;}
  .answer-box code{font-family:'DM Mono',monospace;font-size:11.5px;background:rgba(79,255,176,0.08);color:var(--accent);padding:1px 5px;border-radius:3px;}
  .answer-box ul{padding-left:16px;margin:6px 0;}
  .answer-box ul li{font-size:13px;color:#c8cad4;line-height:1.7;margin-bottom:4px;}
  ::-webkit-scrollbar{width:4px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
  @media(max-width:700px){
    .main{grid-template-columns:1fr;}
    .sidebar{position:static;height:auto;border-right:none;border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;gap:4px;padding:12px;}
    .hero,.content{padding:28px 18px;}
    .nav-item{padding:6px 10px;border-left:none;border-radius:6px;}
    .nav-item.active{border-left:none;background:rgba(79,255,176,0.1);}
    .nav-week{display:none;}
    .kv-grid{grid-template-columns:1fr;}
  }
</style>
