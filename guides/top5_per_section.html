<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" href="../favicon.svg" type="image/svg+xml" />
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top 5 Coding Questions Per Topic</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0e14;
    --surface: #141820;
    --surface2: #1c2130;
    --border: #252d3d;
    --accent: #4f8ef7;
    --accent2: #7c5cfc;
    --green: #3ecf8e;
    --amber: #f5a623;
    --red: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
    --code-bg: #0d1117;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 80px;
  }

  /* HEADER */
  header {
    padding: 48px 40px 32px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #0f1420 0%, var(--bg) 100%);
  }
  header h1 {
    font-size: clamp(22px, 4vw, 38px);
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #fff 30%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  header p { color: var(--muted); font-size: 14px; font-family: 'JetBrains Mono', monospace; }

  /* FILTER BAR */
  .filter-bar {
    display: flex; gap: 8px; flex-wrap: wrap;
    padding: 20px 40px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky; top: 0; z-index: 100;
  }
  .filter-btn {
    padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 600;
    border: 1px solid var(--border); background: transparent; color: var(--muted);
    cursor: pointer; transition: all .2s; font-family: 'Syne', sans-serif;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* MAIN LAYOUT */
  main { padding: 32px 40px; max-width: 1200px; margin: 0 auto; }

  /* SECTION */
  .section { margin-bottom: 48px; }
  .section-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 16px; padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .section-icon {
    width: 36px; height: 36px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .section-title { font-size: 20px; font-weight: 800; }
  .section-count { font-size: 12px; color: var(--muted); font-family: 'JetBrains Mono', monospace; margin-left: auto; }

  /* QUESTION CARD */
  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 12px;
    overflow: hidden;
    transition: border-color .2s;
  }
  .q-card:hover { border-color: #374151; }
  .q-header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 18px; cursor: pointer;
    user-select: none;
  }
  .q-num {
    width: 26px; height: 26px; border-radius: 6px;
    background: var(--surface2); color: var(--muted);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; flex-shrink: 0;
    font-family: 'JetBrains Mono', monospace;
  }
  .q-title { font-size: 15px; font-weight: 600; flex: 1; }
  .q-tag {
    font-size: 11px; padding: 3px 10px; border-radius: 20px;
    font-family: 'JetBrains Mono', monospace; font-weight: 600;
    background: var(--surface2); color: var(--muted);
    border: 1px solid var(--border);
  }
  .q-difficulty {
    font-size: 11px; padding: 3px 10px; border-radius: 20px;
    font-family: 'JetBrains Mono', monospace; font-weight: 600;
  }
  .diff-easy { background: rgba(62,207,142,.1); color: var(--green); }
  .diff-medium { background: rgba(245,166,35,.1); color: var(--amber); }
  .diff-hard { background: rgba(239,68,68,.1); color: var(--red); }
  .q-chevron { color: var(--muted); font-size: 18px; transition: transform .25s; flex-shrink: 0; }
  .q-card.open .q-chevron { transform: rotate(180deg); }

  /* EXPANDED CONTENT */
  .q-body { display: none; border-top: 1px solid var(--border); }
  .q-card.open .q-body { display: block; }

  .q-tabs {
    display: flex; border-bottom: 1px solid var(--border);
    padding: 0 18px; background: var(--surface2);
  }
  .q-tab {
    padding: 10px 16px; font-size: 13px; font-weight: 600; cursor: pointer;
    color: var(--muted); border-bottom: 2px solid transparent;
    transition: all .2s; font-family: 'Syne', sans-serif;
  }
  .q-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .q-panel { display: none; padding: 18px; }
  .q-panel.active { display: block; }

  /* CODE BLOCK */
  pre {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    overflow-x: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.7;
    color: #c9d1d9;
  }
  .kw { color: #ff79c6; }
  .fn { color: #50fa7b; }
  .cm { color: #6272a4; font-style: italic; }
  .str { color: #f1fa8c; }
  .num { color: #bd93f9; }
  .var { color: #8be9fd; }

  /* EXPLANATION */
  .explanation { font-size: 14px; line-height: 1.8; color: #94a3b8; }
  .explanation strong { color: var(--text); }
  .explanation ol, .explanation ul { padding-left: 20px; margin: 8px 0; }
  .explanation li { margin-bottom: 4px; }

  /* PROBLEM STATEMENT */
  .problem-statement {
    font-size: 14px; line-height: 1.9; color: #94a3b8;
  }
  .problem-statement p { margin-bottom: 10px; }
  .problem-statement strong { color: var(--text); }
  .problem-statement code {
    font-family: 'JetBrains Mono', monospace;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 4px; padding: 1px 6px; font-size: 12px; color: #a5d6ff;
  }
  .problem-statement em { color: #c9b3ff; font-style: italic; }
  .problem-examples {
    margin-top: 14px; display: flex; flex-direction: column; gap: 10px;
  }
  .problem-example {
    background: var(--code-bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 14px;
  }
  .problem-example-label {
    font-size: 11px; font-weight: 700; color: var(--accent);
    text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px;
    font-family: 'JetBrains Mono', monospace;
  }
  .problem-example-line {
    font-family: 'JetBrains Mono', monospace; font-size: 12.5px;
    color: #c9d1d9; margin-bottom: 3px;
  }
  .problem-example-line span.label { color: var(--muted); }
  .problem-constraints {
    margin-top: 14px; padding: 12px 14px;
    background: rgba(79,142,247,.06); border: 1px solid rgba(79,142,247,.2);
    border-radius: 8px;
  }
  .problem-constraints-title {
    font-size: 11px; font-weight: 700; color: var(--accent);
    text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px;
  }
  .problem-constraints ul {
    padding-left: 18px; font-family: 'JetBrains Mono', monospace;
    font-size: 12px; color: #94a3b8; line-height: 1.9;
  }

  /* COMPLEXITY TABLE */
  .complexity-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 4px;
  }
  .complexity-card {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px 16px;
  }
  .complexity-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; }
  .complexity-value { font-size: 22px; font-weight: 800; font-family: 'JetBrains Mono', monospace; color: var(--accent); }
  .complexity-desc { font-size: 12px; color: var(--muted); margin-top: 4px; }

  /* SECTION COLORS */
  .ic-arrays { background: rgba(79,142,247,.15); color: var(--accent); }
  .ic-sliding { background: rgba(124,92,252,.15); color: var(--accent2); }
  .ic-two { background: rgba(62,207,142,.15); color: var(--green); }
  .ic-binary { background: rgba(245,166,35,.15); color: var(--amber); }
  .ic-stack { background: rgba(239,68,68,.15); color: var(--red); }
  .ic-linked { background: rgba(79,142,247,.15); color: var(--accent); }
  .ic-trees { background: rgba(62,207,142,.15); color: var(--green); }
  .ic-graphs { background: rgba(124,92,252,.15); color: var(--accent2); }
  .ic-dp { background: rgba(245,166,35,.15); color: var(--amber); }
  .ic-backtrack { background: rgba(239,68,68,.15); color: var(--red); }
  .ic-heap { background: rgba(79,142,247,.15); color: var(--accent); }

  @media (max-width: 600px) {
    header, .filter-bar, main { padding-left: 16px; padding-right: 16px; }
    .complexity-grid { grid-template-columns: 1fr; }
    .q-tag { display: none; }
  }
</style>

<header>
  <h1>Top 5 Coding Questions Per Topic</h1>
  <p>// JavaScript solutions · problem statements · explanations · time &amp; space complexity</p>
</header>

<div class="filter-bar">
  <button class="filter-btn active" onclick="filterDiff('all',this)">All</button>
  <button class="filter-btn" onclick="filterDiff('easy',this)">Easy</button>
  <button class="filter-btn" onclick="filterDiff('medium',this)">Medium</button>
  <button class="filter-btn" onclick="filterDiff('hard',this)">Hard</button>
</div>

<main id="main"></main>

<script>
const DATA = [
  {
    section: "Arrays & Hashing", icon: "ic-arrays", emoji: "▦",
    questions: [
      {
        title: "Product of Array Except Self", tag: "Prefix", diff: "medium",
        problem: `<p>Given an integer array <code>nums</code>, return an array <code>answer</code> such that <code>answer[i]</code> is equal to the product of all the elements of <code>nums</code> except <code>nums[i]</code>.</p><p>The product of any prefix or suffix of <code>nums</code> is <strong>guaranteed</strong> to fit in a 32-bit integer. You must write an algorithm that runs in <code>O(n)</code> time and <strong>without using the division operation</strong>.</p><div class="problem-examples"><div class="problem-example"><div class="problem-example-label">Example 1</div><div class="problem-example-line"><span class="label">Input: </span>nums = [1,2,3,4]</div><div class="problem-example-line"><span class="label">Output: </span>[24,12,8,6]</div></div><div class="problem-example"><div class="problem-example-label">Example 2</div><div class="problem-example-line"><span class="label">Input: </span>nums = [-1,1,0,-3,3]</div><div class="problem-example-line"><span class="label">Output: </span>[0,0,9,0,0]</div></div></div><div class="problem-constraints"><div class="problem-constraints-title">Constraints</div><ul><li>2 ≤ nums.length ≤ 10⁵</li><li>-30 ≤ nums[i] ≤ 30</li><li>The product of any prefix or suffix fits in a 32-bit integer</li></ul></div>`,
        code: `<span class="cm">// No division allowed — use prefix & suffix products</span>
<span class="kw">function</span> <span class="fn">productExceptSelf</span>(<span class="var">nums</span>) {
  <span class="kw">const</span> <span class="var">n</span> = <span class="var">nums</span>.length;
  <span class="kw">const</span> <span class="var">result</span> = <span class="kw">new</span> <span class="fn">Array</span>(<span class="var">n</span>).<span class="fn">fill</span>(<span class="num">1</span>);

  <span class="cm">// Left pass: result[i] = product of all nums to the left</span>
  <span class="kw">let</span> <span class="var">prefix</span> = <span class="num">1</span>;
  <span class="kw">for</span> (<span class="kw">let</span> <span class="var">i</span> = <span class="num">0</span>; <span class="var">i</span> &lt; <span class="var">n</span>; <span class="var">i</span>++) {
    <span class="var">result</span>[<span class="var">i</span>] = <span class="var">prefix</span>;
    <span class="var">prefix</span> *= <span class="var">nums</span>[<span class="var">i</span>];
  }

  <span class="cm">// Right pass: multiply result[i] by product of all nums to the right</span>
  <span class="kw">let</span> <span class="var">suffix</span> = <span class="num">1</span>;
  <span class="kw">for</span> (<span class="kw">let</span> <span class="var">i</span> = <span class="var">n</span> - <span class="num">1</span>; <span class="var">i</span> >= <span class="num">0</span>; <span class="var">i</span>--) {
    <span class="var">result</span>[<span class="var">i</span>] *= <span class="var">suffix</span>;
    <span class="var">suffix</span> *= <span class="var">nums</span>[<span class="var">i</span>];
  }
  <span class="kw">return</span> <span class="var">result</span>;
}`,
        explanation: `<strong>Key insight:</strong> For each index <code>i</code>, the answer is <em>product of everything to the left</em> × <em>product of everything to the right</em>.<br><br>
<ol>
  <li><strong>Left pass:</strong> Build prefix products — <code>result[i]</code> holds the product of all elements before index <code>i</code>.</li>
  <li><strong>Right pass:</strong> Traverse right-to-left maintaining a running suffix product, multiplying into <code>result[i]</code>.</li>
  <li>No division needed, so works even with zeros in the array.</li>
</ol>`,
        time: "O(n)", space: "O(1)", timeDesc: "Two linear passes", spaceDesc: "Output array doesn't count"
      },
      {
        title: "Top K Frequent Elements", tag: "Bucket Sort", diff: "medium",
        problem: `<p>Given an integer array <code>nums</code> and an integer <code>k</code>, return the <code>k</code> most frequent elements. You may return the answer in <strong>any order</strong>.</p><div class="problem-examples"><div class="problem-example"><div class="problem-example-label">Example 1</div><div class="problem-example-line"><span class="label">Input: </span>nums = [1,1,1,2,2,3], k = 2</div><div class="problem-example-line"><span class="label">Output: </span>[1,2]</div></div><div class="problem-example"><div class="problem-example-label">Example 2</div><div class="problem-example-line"><span class="label">Input: </span>nums = [1], k = 1</div><div class="problem-example-line"><span class="label">Output: </span>[1]</div></div></div><div class="problem-constraints"><div class="problem-constraints-title">Constraints</div><ul><li>1 ≤ nums.length ≤ 10⁵</li><li>k is in the range [1, the number of unique elements in the array]</li><li>It is guaranteed that the answer is unique</li><li>Algorithm must be better than O(n log n) time complexity</li></ul></div>`,
        code: `<span class="kw">function</span> <span class="fn">topKFrequent</span>(<span class="var">nums</span>, <span class="var">k</span>) {
  <span class="cm">// Count frequencies</span>
  <span class="kw">const</span> <span class="var">freq</span> = <span class="kw">new</span> <span class="fn">Map</span>();
  <span class="kw">for</span> (<span class="kw">const</span> <span class="var">n</span> <span class="kw">of</span> <span class="var">nums</span>) <span class="var">freq</span>.<span class="fn">set</span>(<span class="var">n</span>, (<span class="var">freq</span>.<span class="fn">get</span>(<span class="var">n</span>) || <span class="num">0</span>) + <span class="num">1</span>);

  <span class="cm">// Bucket by frequency (index = frequency count)</span>
  <span class="kw">const</span> <span class="var">buckets</span> = <span class="kw">new</span> <span class="fn">Array</span>(<span class="var">nums</span>.length + <span class="num">1</span>).<span class="fn">fill</span>(<span class="kw">null</span>).<span class="fn">map</span>(() => []);
  <span class="kw">for</span> (<span class="kw">const</span> [<span class="var">num</span>, <span class="var">count</span>] <span class="kw">of</span> <span class="var">freq</span>) <span class="var">buckets</span>[<span class="var">count</span>].<span class="fn">push</span>(<span class="var">num</span>);

  <span class="cm">// Collect top k from highest-frequency buckets</span>

        code: `<span class="kw">function</span> <span class="fn">numIslands</span>(<span class="var">grid</span>) {

        code: `<span class="kw">function</span> <span class="fn">cloneGraph</span>(<span class="var">node</span>, <span class="var">visited</span> = <span class="kw">new</span> <span class="fn">Map</span>()) {

  <span class="kw">const</span> <span class="var">clone</span> = { <span class="var">val</span>: <span class="var">node</span>.<span class="var">val</span>, <span class="var">neighbors</span>: [] };

        code: `<span class="kw">function</span> <span class="fn">canFinish</span>(<span class="var">numCourses</span>, <span class="var">prerequisites</span>) {

      {

        problem: `<p>There is an <code>m x n</code> rectangular island that borders both the <strong>Pacific Ocean</strong> and the <strong>Atlantic Ocean</strong>. The Pacific Ocean touches the island's left and top edges, and the Atlantic Ocean touches the island's right and bottom edges.</p><p>The island is partitioned into a grid of square cells. You are given an <code>m x n</code> integer matrix <code>heights</code> where <code>heights[r][c]</code> represents the height above sea level of the cell at coordinate <code>(r, c)</code>. Rain water can flow to neighboring cells directly north, south, east, and west if the neighboring cell's height is less than or equal to the current cell's height.</p><p>Return a list of grid coordinates where water can flow to both the Pacific and Atlantic oceans.</p><div class="problem-examples"><div class="problem-example"><div class="problem-example-label">Example 1</div><div class="problem-example-line"><span class="label">Input: </span>heights = [[1,2,2,3,5],[3,2,3,4,4],[2,4,5,3,1],[6,7,1,4,5],[5,1,1,2,4]]</div><div class="problem-example-line"><span class="label">Output: </span>[[0,4],[1,3],[1,4],[2,2],[3,0],[3,1],[4,0]]</div></div></div><div class="problem-constraints"><div class="problem-constraints-title">Constraints</div><ul><li>m == heights.length, n == heights[r].length</li><li>1 ≤ m, n ≤ 200</li><li>0 ≤ heights[r][c] ≤ 10⁵</li></ul></div>`,
        code: `<span class="kw">function</span> <span class="fn">pacificAtlantic</span>(<span class="var">heights</span>) {

      <span class="kw">for</span> (<span class="kw">const</span> [<span class="var">dr</span>,<span class="var">dc</span>] <span class="kw">of</span> [[-<span class="num">1</span>,<span class="num">0</span>],[<span class="num">1</span>,<span class="num">0</span>],[<span class="num">0</span>,-<span class="num">1</span>],[<span class="num">0</span>,<span class="num">1</span>]]) {
        <span class="kw">const</span> [<span class="var">nr</span>,<span class="var">nc</span>] = [<span class="var">r</span>+<span class="var">dr</span>, <span class="var">c</span>+<span class="var">dc</span>];
        <span class="kw">const</span> <span class="var">key</span> = <span class="var">nr</span>*<span class="var">cols</span>+<span class="var">nc</span>;
        <span class="kw">if</span> (<span class="var">nr</span>>=<span class="num">0</span>&&<span class="var">nr</span>&lt;<span class="var">rows</span>&&<span class="var">nc</span>>=<span class="num">0</span>&&<span class="var">nc</span>&lt;<span class="var">cols</span>
            &&!<span class="var">visited</span>.<span class="fn">has</span>(<span class="var">key</span>)&&<span class="var">heights</span>[<span class="var">nr</span>][<span class="var">nc</span>]>=<span class="var">heights</span>[<span class="var">r</span>][<span class="var">c</span>]) {
          <span class="var">visited</span>.<span class="fn">add</span>(<span class="var">key</span>); <span class="var">q</span>.<span class="fn">push</span>([<span class="var">nr</span>,<span class="var">nc</span>]);
        }

  };
  <span class="kw">const</span> <span class="var">pac</span> = [], <span class="var">atl</span> = [];
  <span class="kw">for</span> (<span class="kw">let</span> <span class="var">r</span>=<span class="num">0</span>;<span class="var">r</span>&lt;<span class="var">rows</span>;<span class="var">r</span>++) { <span class="var">pac</span>.<span class="fn">push</span>([<span class="var">r</span>,<span class="num">0</span>]); <span class="var">atl</span>.<span class="fn">push</span>([<span class="var">r</span>,<span class="var">cols</span>-<span class="num">1</span>]); }
  <span class="kw">for</span> (<span class="kw">let</span> <span class="var">c</span>=<span class="num">0</span>;<span class="var">c</span>&lt;<span class="var">cols</span>;<span class="var">c</span>++) { <span class="var">pac</span>.<span class="fn">push</span>([<span class="num">0</span>,<span class="var">c</span>]); <span class="var">atl</span>.<span class="fn">push</span>([<span class="var">rows</span>-<span class="num">1</span>,<span class="var">c</span>]); }
  <span class="kw">const</span> <span class="var">pSet</span> = <span class="fn">bfs</span>(<span class="var">pac</span>), <span class="var">aSet</span> = <span class="fn">bfs</span>(<span class="var">atl</span>);
  <span class="kw">const</span> <span class="var">res</span> = [];

    <span class="kw">for</span> (<span class="kw">let</span> <span class="var">c</span>=<span class="num">0</span>;<span class="var">c</span>&lt;<span class="var">cols</span>;<span class="var">c</span>++)

      {
        title: "Word Ladder", tag: "BFS", diff: "hard",
        problem: `<p>A <strong>transformation sequence</strong> from word <code>beginWord</code> to word <code>endWord</code> using a dictionary <code>wordList</code> is a sequence where adjacent words differ by exactly one letter and every word is in the wordList. Given <code>beginWord</code>, <code>endWord</code>, and <code>wordList</code>, return the <strong>number of words in the shortest transformation sequence</strong>, or <code>0</code> if no such sequence exists.</p><div class="problem-examples"><div class="problem-example"><div class="problem-example-label">Example 1</div><div class="problem-example-line"><span class="label">Input: </span>beginWord = "hit", endWord = "cog", wordList = ["hot","dot","dog","lot","log","cog"]</div><div class="problem-example-line"><span class="label">Output: </span>5</div><div class="problem-example-line"><span class="label">Explanation: </span>hit → hot → dot → dog → cog (5 words)</div></div><div class="problem-example"><div class="problem-example-label">Example 2</div><div class="problem-example-line"><span class="label">Input: </span>beginWord = "hit", endWord = "cog", wordList = ["hot","dot","dog","lot","log"]</div><div class="problem-example-line"><span class="label">Output: </span>0</div><div class="problem-example-line"><span class="label">Explanation: </span>endWord "cog" not in wordList</div></div></div><div class="problem-constraints"><div class="problem-constraints-title">Constraints</div><ul><li>1 ≤ beginWord.length ≤ 10</li><li>endWord.length == beginWord.length</li><li>1 ≤ wordList.length ≤ 5000</li><li>All words are lowercase English letters</li></ul></div>`,
        code: `<span class="kw">function</span> <span class="fn">ladderLength</span>(<span class="var">beginWord</span>, <span class="var">endWord</span>, <span class="var">wordList</span>) {

    <span class="kw">const</span> [<span class="var">word</span>, <span class="var">len</span>] = <span class="var">queue</span>.<span class="fn">shift</span>();
    <span class="kw">for</span> (<span class="kw">let</span> <span class="var">i</span> = <span class="num">0</span>; <span class="var">i</span> &lt; <span class="var">word</span>.length; <span class="var">i</span>++) {

        <span class="kw">const</span> <span class="var">next</span> = <span class="var">word</span>.<span class="fn">slice</span>(<span class="num">0</span>,<span class="var">i</span>) + <span class="fn">String</span>.<span class="fn">fromCharCode</span>(<span class="var">c</span>) + <span class="var">word</span>.<span class="fn">slice</span>(<span class="var">i</span>+<span class="num">1</span>);
        <span class="kw">if</span> (<span class="var">next</span> === <span class="var">endWord</span>) <span class="kw">return</span> <span class="var">len</span> + <span class="num">1</span>;
        <span class="kw">if</span> (<span class="var">wordSet</span>.<span class="fn">has</span>(<span class="var">next</span>) && !<span class="var">visited</span>.<span class="fn">has</span>(<span class="var">next</span>)) {
          <span class="var">visited</span>.<span class="fn">add</span>(<span class="var">next</span>); <span class="var">queue</span>.<span class="fn">push</span>([<span class="var">next</span>, <span class="var">len</span> + <span class="num">1</span>]);
        }

    }

      .<span class="fn">sort</span>((<span class="var">a</span>, <span class="var">b</span>) => <span class="var">b</span>.<span class="var">t</span> - <span class="var">a</span>.<span class="var">t</span>);
    <span class="kw">return</span> <span class="var">all</span>.<span class="fn">slice</span>(<span class="num">0</span>, <span class="num">10</span>).<span class="fn">map</span>(<span class="var">x</span> => <span class="var">x</span>.<span class="var">id</span>);
  }
  <span class="fn">follow</span>(<span class="var">f</span>, <span class="var">e</span>) {
    <span class="kw">if</span> (!<span class="kw">this</span>.<span class="var">follows</span>.<span class="fn">has</span>(<span class="var">f</span>)) <span class="kw">this</span>.<span class="var">follows</span>.<span class="fn">set</span>(<span class="var">f</span>, <span class="kw">new</span> <span class="fn">Set</span>());
    <span class="kw">this</span>.<span class="var">follows</span>.<span class="fn">get</span>(<span class="var">f</span>).<span class="fn">add</span>(<span class="var">e</span>);
  }
  <span class="fn">unfollow</span>(<span class="var">f</span>, <span class="var">e</span>) { <span class="kw">this</span>.<span class="var">follows</span>.<span class="fn">get</span>(<span class="var">f</span>)?.<span class="fn">delete</span>(<span class="var">e</span>); }
}`,
        explanation: `<strong>Key insight:</strong> Merge tweet streams from all followed users, then take the top 10 by timestamp. A min-heap of size 10 gives O(n log 10) = O(n); here a sort is used for clarity.<br><br>
<ol>
  <li>A global timestamp counter orders tweets without real dates.</li>
  <li>On <code>getNewsFeed</code>: collect all tweets from self + followees, sort by timestamp descending, return top 10 IDs.</li>
  <li>Optimal solution uses a min-heap to merge k sorted tweet lists — each pointer advances one step at a time.</li>
</ol>`,
        time: "O(n log n)", space: "O(n)", timeDesc: "n = total tweets from followees", spaceDesc: "Tweet and follow maps"
      }
    ]
  }
];

function buildUI() {
  const main = document.getElementById('main');
  DATA.forEach(section => {
    const sec = document.createElement('div');
    sec.className = 'section';
    sec.dataset.section = section.section;

    sec.innerHTML = `
      <div class="section-header">
        <div class="section-icon ${section.icon}">${section.emoji}</div>
        <span class="section-title">${section.section}</span>
        <span class="section-count">${section.questions.length} questions</span>
      </div>
    `;

    section.questions.forEach((q, qi) => {
      const card = document.createElement('div');
      card.className = 'q-card';
      card.dataset.diff = q.diff;
      card.innerHTML = `
        <div class="q-header" onclick="toggleCard(this)">
          <div class="q-num">${qi+1}</div>
          <span class="q-title">${q.title}</span>
          <span class="q-tag">${q.tag}</span>
          <span class="q-difficulty diff-${q.diff}">${q.diff}</span>
          <span class="q-chevron">⌄</span>
        </div>
        <div class="q-body">
          <div class="q-tabs">
            <div class="q-tab active" onclick="switchTab(this,'problem')">Problem</div>
            <div class="q-tab" onclick="switchTab(this,'solution')">Solution</div>
            <div class="q-tab" onclick="switchTab(this,'explanation')">Explanation</div>
            <div class="q-tab" onclick="switchTab(this,'complexity')">Complexity</div>
          </div>
          <div class="q-panel active" data-panel="problem">
            <div class="problem-statement">${q.problem}</div>
          </div>
          <div class="q-panel" data-panel="solution">
            <pre>${q.code}</pre>
          </div>
          <div class="q-panel" data-panel="explanation">
            <div class="explanation">${q.explanation}</div>
          </div>
          <div class="q-panel" data-panel="complexity">
            <div class="complexity-grid">
              <div class="complexity-card">
                <div class="complexity-label">Time complexity</div>
                <div class="complexity-value">${q.time}</div>
                <div class="complexity-desc">${q.timeDesc}</div>
              </div>
              <div class="complexity-card">
                <div class="complexity-label">Space complexity</div>
                <div class="complexity-value">${q.space}</div>
                <div class="complexity-desc">${q.spaceDesc}</div>
              </div>
            </div>
          </div>
        </div>
      `;
      sec.appendChild(card);
    });
    main.appendChild(sec);
  });
}

function toggleCard(header) {
  header.parentElement.classList.toggle('open');
}

function switchTab(tab, panel) {
  const body = tab.closest('.q-body');
  body.querySelectorAll('.q-tab').forEach(t => t.classList.remove('active'));
  body.querySelectorAll('.q-panel').forEach(p => p.classList.remove('active'));
  tab.classList.add('active');
  body.querySelector(`[data-panel="${panel}"]`).classList.add('active');
}

function filterDiff(diff, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.q-card').forEach(card => {
    card.style.display = (diff === 'all' || card.dataset.diff === diff) ? '' : 'none';
  });
  document.querySelectorAll('.section').forEach(sec => {
    const visible = [...sec.querySelectorAll('.q-card')].some(c => c.style.display !== 'none');
    sec.style.display = visible ? '' : 'none';
  });
}

buildUI();
</script>
