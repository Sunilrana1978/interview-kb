<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Redirecting… — Interview KB</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml" />
<style>
  body { font-family: Inter, system-ui, sans-serif; background: #f0f2f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
  .box { background: #fff; border: 1px solid #e0e4ea; border-radius: 10px; padding: 2rem 2.5rem; text-align: center; max-width: 400px; }
  .box h1 { font-size: 1rem; font-weight: 600; color: #1a1a2e; margin-bottom: .5rem; }
  .box p { font-size: .82rem; color: #7a849e; margin-bottom: 1.25rem; }
  .box a { display: inline-block; padding: .45rem 1rem; background: #1565c0; color: #fff; border-radius: 6px; font-size: .82rem; font-weight: 500; text-decoration: none; }
</style>
<script>
  (function () {
    var path = window.location.pathname;
    // Redirect /interview-kb/some-guide.html → /interview-kb/guides/some-guide.html
    var m = path.match(/\/interview-kb\/([^/]+\.html)$/);
    if (m && m[1] !== 'index.html') {
      window.location.replace('/interview-kb/guides/' + m[1]);
    }
  })();
</script>
</head>
<body>
<div class="box">
  <h1>Page moved</h1>
  <p>This guide has moved to a new location. Redirecting you now…</p>
  <a href="/interview-kb/">← Back to all guides</a>
</div>
</body>
</html>
